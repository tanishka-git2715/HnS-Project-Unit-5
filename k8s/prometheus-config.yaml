apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
spec:
  data:
    prometheus.yml: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: 'churn-api'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: churn-api
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: 8000
